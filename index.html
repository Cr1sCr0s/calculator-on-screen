<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>

<body>
  <div class="calcu">
    <div class="calcu-display">
      <p class="calcu-expr"></p>
      <div>
        <p class="calcu-result"></p>
      </div>
    </div>

    <div class="calcu-btns">
      <div class="calcu-input">
        <button class="calcu-seven">7</button>
        <button class="calcu-eight">8</button>
        <button class="calcu-nine">9</button>
        <button class="calcu-four">4</button>
        <button class="calcu-five">5</button>
        <button class="calcu-six">6</button>
        <button class="calcu-one">1</button>
        <button class="calcu-two">2</button>
        <button class="calcu-three">3</button>
        <button class="calcu-zero">0</button>
        <button class="calcu-dot">.</button>
      </div>
      <div class="calcu-operations">
        <button class="calcu-multiply">×</button>
        <button class="calcu-divide">÷</button>
        <button class="calcu-add">+</button>
        <button class="calcu-subtract">-</button>
        <button class="calcu-all-clear">AC</button>
        <button class="calcu-equal">=</button>
      </div>
    </div>
  </div>
</body>
</html>
